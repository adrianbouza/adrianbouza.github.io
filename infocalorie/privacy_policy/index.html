<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - InfoCalorie</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="icon" href="../imgs/icon.png" type="image/png">

    <style>
        :root {
            --bg-color: #0f1014;
            --surface-color: #1a1c23;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent-gradient: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --accent-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Nav */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 16, 20, 0.85);
            backdrop-filter: blur(16px);
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        
        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.4);
        }

        /* Main Content */
        .content-container {
            flex: 1;
            padding: 10rem 5% 4rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .markdown-body {
            background: var(--surface-color);
            padding: 3.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.02);
            font-size: 1.05rem;
            color: var(--text-secondary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: var(--text-primary);
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-weight: 800;
        }

        .markdown-body h1 { 
            font-size: 2.5rem; 
            margin-top: 0;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .markdown-body h2 { font-size: 1.8rem; }
        .markdown-body h3 { font-size: 1.4rem; }

        .markdown-body p { margin-bottom: 1.5rem; }
        .markdown-body ul, .markdown-body ol { margin-bottom: 1.5rem; padding-left: 2rem; }
        .markdown-body li { margin-bottom: 0.5rem; }
        .markdown-body a { color: var(--accent-color); text-decoration: underline; }
        .markdown-body strong { color: var(--text-primary); }

        /* Footer */
        footer {
            padding: 4rem 5% 2rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
            background: #0a0b0e;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .contact-info {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .copyright {
            color: var(--text-secondary);
            font-size: 0.875rem;
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .markdown-body {
                padding: 2rem;
            }
            .content-container {
                padding-top: 8rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="../" class="logo-container">
            <img src="../imgs/icon.png" alt="InfoCalorie Icon" class="logo">
            InfoCalorie
        </a>
        <a href="../" class="btn-outline">Back to Home</a>
    </nav>

    <main class="content-container">
        <div id="privacy-content" class="markdown-body">
            Loading Privacy Policy...
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="logo-container">
                <img src="../imgs/icon.png" alt="InfoCalorie Icon" class="logo">
                InfoCalorie
            </div>
            <div class="contact-info">
                Need help? <a href="mailto:abnaveira.dev@gmail.com" style="color: var(--text-primary); font-weight: 600;">abnaveira.dev@gmail.com</a>
            </div>
        </div>
        <div class="copyright">
            &copy; 2026 InfoCalorie. All rights reserved.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Fetch and render Privacy Policy from the parent directory
        fetch('../PRIVACY_POLICY.md')
            .then(response => {
                if (!response.ok) throw new Error('Failed to load privacy policy');
                return response.text();
            })
            .then(text => {
                document.getElementById('privacy-content').innerHTML = marked.parse(text);
            })
            .catch(error => {
                document.getElementById('privacy-content').innerHTML = '<p>Error loading privacy policy. Please try again later. Note: This page must be served via a web server (like python -m http.server or GitHub Pages) for the local markdown fetch to work correctly due to browser security restrictions.</p>';
                console.error('Error fetching privacy policy:', error);
            });
    </script>
</body>
</html>
